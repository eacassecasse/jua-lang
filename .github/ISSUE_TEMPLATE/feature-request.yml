name: Feature Request
description: Suggest a new capability or enhancement.
title: "[FEATURE]: "
labels:
  - type:feature

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: impact
    attributes:
      label: Expected Impact

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Compiler
        - Runtime
        - Standard Library
        - Toolchain
        - SDK
        - Documentation
        - Education
