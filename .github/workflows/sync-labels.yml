name: Sync Repository Labels

on:
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: repository-labels
  cancel-in-progress: false

jobs:
  sync-labels:
    name: Synchronize Labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync Labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const labels = JSON.parse(
              fs.readFileSync('.github/labels/labels.json', 'utf8')
            );

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const existing = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner,
                repo,
                per_page: 100
              }
            );

            const existingMap = new Map(
              existing.map(label => [label.name, label])
            );

            for (const label of labels) {
              if (existingMap.has(label.name)) {
                console.log(`Updating: ${label.name}`);

                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
              } else {
                console.log(`Creating: ${label.name}`);

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              }
            }

            console.log(
              `Successfully synchronized ${labels.length} labels.`
            );
