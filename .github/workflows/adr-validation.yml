name: ADR Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  adr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate ADR Metadata
        run: |
          for file in architecture/decisions/*.md
          do
            grep -q "^status:" "$file" || exit 1
            grep -q "^date:" "$file" || exit 1
            grep -q "^decision-makers:" "$file" || exit 1
          done
