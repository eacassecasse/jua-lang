name: Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: gitleaks/gitleaks-action@v2

  trivy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
