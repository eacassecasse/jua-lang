name: Issue Validation

on:
  issues:
    types:
      - opened
      - edited

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Issue Content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            if (body.length < 100) {
              core.setFailed(
                "Issue description is too short."
              );
            }
